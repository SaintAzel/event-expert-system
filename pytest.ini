[pytest]
testpaths = tests
pythonpath = backend/src
addopts =
    -ra
    --strict-markers
    --cov=event_expert
    --cov-report=term-missing
    --cov-report=html:reports/coverage_html
    --cov-report=xml:reports/coverage.xml
    --cov-fail-under=75
markers =
    api: REST API integration tests
    unit: unit and domain-level tests
